name: Build Boffin-Wayland APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Actions ট্যাব থেকে ম্যানুয়ালি বিল্ড রান করার জন্য

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
        # THE FIX: GitHub's Ubuntu runner ships Java 8/11/17/21/25 side by
        # side, but JAVA_HOME defaults to 11. `apt-get install openjdk-17-jdk`
        # (removed below) installs a copy but does NOT change JAVA_HOME, so
        # Gradle kept picking up Java 11 and the Android Gradle Plugin
        # (which requires 17) failed. setup-java properly exports JAVA_HOME
        # (and PATH) for every later step in this job.

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer & Cython
        run: |
          pip install --upgrade pip
          # NOTE: do NOT pip-install a pinned python-for-android version here -
          # buildozer ignores it and clones its own copy from GitHub, using
          # p4a.branch from buildozer.spec (which is now pinned to v2024.01.21,
          # the release that added Kivy 2.3.0 support - see buildozer.spec
          # for the full explanation). Pinning it here was a dead end.
          pip install buildozer cython==0.29.36 virtualenv

      - name: Build Native C++ Libraries (PTY & Lorie Bridge)
        run: |
          # NDK পাথ সেট করা এবং C++ কোড কম্পাইল করা
          chmod +x cpp/build_native.sh
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          ./cpp/build_native.sh

      - name: Build APK with Buildozer
        run: |
          yes | buildozer android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Boffin-Wayland-APK
          path: bin/*.apk
          retention-days: 7
